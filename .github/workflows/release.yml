name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  id-token: write      # artifact attestation 需要
  attestations: write  # artifact attestation 需要

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build plugin
        run: |
          npm ci
          npm run lint
          npm test
          npm run build

      # 产物来源证明：让用户能加密验证 release 资产确由本仓库源码构建
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/main.js, dist/manifest.json, dist/styles.css'

      - name: Create release with plugin assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            dist/main.js dist/manifest.json dist/styles.css
